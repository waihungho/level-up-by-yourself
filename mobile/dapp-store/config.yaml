  catalog:
    en-US:
      name: Level Up by Yourself - AI Agent RPG on Solana
      short_description: AI Agent RPG on Solana
      long_description: |
        Level Up by Yourself is an idle RPG where you summon, train, and battle
        AI-powered agents on the Solana blockchain.

        GAMEPLAY:
        - Summon unique agents with distinct roles and abilities
        - Train agents through daily tasks and growth dimensions
        - Battle other players' agents in turn-based combat
        - Earn ability points and climb the leaderboard

        FEATURES:
        - Free summon every 7 days or pay SOL to summon instantly
        - 15 growth dimensions across Mental, Technical, Social, Physical, and Spiritual
        - AI-generated growth narratives for each agent
        - Seeker Task missions for bonus rewards
        - Powered by Solana for fast, low-cost transactions
      new_in_version: |
        v1.0.0 Build 2
        - Added feature graphic for dApp Store
        - Optimized APK for Seeker (arm64-v8a only)
        - Performance and stability improvements
