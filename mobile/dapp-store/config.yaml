solana_mobile_dapp_publisher_portal:
  google_store_package: ''
  testing_instructions: |
    1. Launch the app
    2. Tap "Connect Wallet" and authorize with Phantom or Solflare
    3. You will be redirected to the main game screen
    4. Go to Dashboard to see your stats and agents
    5. Tap "Summon Agent" to create your first agent
    6. Visit "Battle" to train and fight other agents
    7. Check "Rank" to see the leaderboard
    8. Try "Seeker Task" from the dashboard for bonus missions
